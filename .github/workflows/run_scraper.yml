name: Daily Edital Scraper

on:
  schedule:
    # Runs at 00:00 UTC every day.
    # Note: Adjust the cron for your specific timezone if midnight local time is strongly required (UTC-3 for Brazil is 03:00 UTC).
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  scrape-editais:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # pip install -r requirements.txt (Descomentar quando requirementes existir)
        # pip install playwright
        # playwright install chromium

    - name: Run Scraper (Extract, Transform, Sink)
      run: |
        # python main.py (Substituir pelo script principal da aplicação)
        echo "Rodando o scraper..."

