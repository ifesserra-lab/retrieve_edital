name: Daily Edital Scraper

on:
  schedule:
    # Roda todos os dias às 03:00 UTC (meia-noite no horário de Brasília, UTC-3)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite disparo manual pela UI do GitHub

jobs:
  scrape-editais:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright browsers
      run: playwright install chromium --with-deps

    - name: Run Scraper (Extract, Transform, Sink)
      run: |
        python scripts/run_all_flows.py

    - name: Commit and Push JSON Results
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/output registry/processed_editais.json docs/flow_processing_log.md || true
        git diff --staged --quiet || git commit -m "chore: atualiza dados raspados dos editais [skip ci]"
        git push
